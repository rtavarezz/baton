  run:
    timeout: 5m
    skip-dirs:
      - vendor
      - generated
    skip-files:
      - '.*_generated.go$'

  linters:
    disable-all: true
    enable:
      - errcheck         # Check for unchecked errors.
      - staticcheck      # Advanced static analysis.
      - govet            # Reports suspicious constructs.
      - typecheck        # Catches type errors.
      - ineffassign      # Detects ineffectual assignments.
      - unused           # Checks for unused variables/constants.
      - gosimple         # Suggests simpler code constructs.
      - nilerr           # Detects returning nil error with non-nil value.

  linters-settings:
    errcheck:
      # Exclude common functions where error checking is unnecessary.
      excludeFuncs:
        - fmt.Fprintf
        - fmt.Printf
        - fmt.Sprintf
        - '.*\.Close$'

    staticcheck:
      checks: ["all", "-ST1000", "-ST1003"]

    govet:
      enable:
        - all
      disable:
        - structtag  # Disable struct tag warnings for flexibility.

  issues:
    max-same-issues: 5
    exclude-use-default: false
    exclude:
      - 'error return value not checked.*(Close|Write|Flush)'
      - 'field.*is unused'  # Temporarily ignore unused fields.
      - 'Error return value of.*\.Close.* is not checked'
      - 'Error return value of `fmt.Fprintf` is not checked'

  output:
    print-issued-lines: true
    sort-results: true
